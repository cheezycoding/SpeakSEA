name: Odyssey Advance Sales Poller

on:
  schedule:
    # Every 12 hours: midnight and noon UTC (8am and 8pm SGT)
    - cron: "0 0,12 * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Abort if past deadline
        run: |
          DEADLINE="2026-07-16"
          TODAY=$(date -u +%Y-%m-%d)
          if [[ "$TODAY" > "$DEADLINE" ]]; then
            echo "Past deadline $DEADLINE. Stopping."
            exit 0
          fi

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install requests

      - name: Poll shaw.sg — fail this job if Odyssey appears
        # Script exits 1 (found) → step fails → GitHub emails you
        # Script exits 0 (not found) → step passes → silence
        run: python scripts/check_odyssey.py --movie "Odyssey"
